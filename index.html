<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acai Fast Food | Apps</title>
    <meta name="theme-color" content="#1f2e25" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-lockup">
        <img class="app-logo" src="logo-acai.png" alt="Acai Fast Food" />
        <div>
          <p class="eyebrow">Acai Fast Food</p>
          <h1>Apps de Estoque</h1>
        </div>
      </div>
    </header>

    <main class="app-shell portal-shell">
      <section class="portal-grid">
        <a class="portal-card" href="gestor.html">
          <span class="portal-label">Gestao</span>
          <strong>App do Gestor</strong>
          <span>Dashboard, filtros, cadastro, movimentos e sincronizacao com Notion.</span>
        </a>

        <a class="portal-card" href="funcionario.html">
          <span class="portal-label">Operacao</span>
          <strong>Controle de Estoque</strong>
          <span>Contagem diaria simples: produto, minimo e quantidade em estoque.</span>
        </a>
      </section>

      <div class="sync-banner warning">
        <span>Para ligar ao Notion, abre por http://localhost:4173 e nao pelo ficheiro local.</span>
      </div>
    </main>
  </body>
</html>
